# Agent OS 策略配置文件

# ==================== 可用插件列表 ====================
# 交易所插件 (exchange): Binance, CoinGecko, YahooFinance, Finviz
# 策略插件 (strategy): BollingerBand, MACD, RSI, SimpleHold
# LLM插件 (llm): DeepSeek, MockLLM
# 行动插件 (action): ServerChanPush, SaveDraft, MemeGenerator, Polisher

# ==================== 策略模板 ====================
templates:
  simple:
    name: "简单分析"
    description: "只获取数据，不做决策"
    金融:
      steps:
        - plugin: Binance
          config:
            symbol: BTCUSDT
            timeframe: 4h
  
  technical:
    name: "技术分析"
    description: "用技术指标分析，给出方向"
    金融:
      steps:
        - plugin: Binance
          config:
            symbol: BTCUSDT
            timeframe: 4h
        - plugin: BollingerBand
          config: {}
        - plugin: ServerChanPush
          config: {}
  
  ai_decision:
    name: "AI决策"
    description: "大模型深度分析"
    金融:
      steps:
        - plugin: Binance
          config:
            symbol: BTCUSDT
            timeframe: 4h
        - plugin: BollingerBand
          config: {}
        - plugin: DeepSeek
          config:
            prompt: "根据技术分析结果，给出明确的买卖建议"
        - plugin: ServerChanPush
          config: {}

# ==================== 你的个人策略 ====================
# 修改这里，配置你自己的流程
my_strategy:
  name: "我的策略"
  
  # 金融领域
  金融:
    steps:
      - plugin: Binance
        config:
          symbol: BTCUSDT
          timeframe: 4h
      - plugin: BollingerBand
        config:
          period: 20
          strategy_desc: "下轨做多，上轨看空"
      - plugin: DeepSeek
        config:
          prompt: "根据布林带信号，给出明确的买卖建议，只说方向"
      - plugin: ServerChanPush
        config: {}
  
  # 热点领域
  热点:
    steps:
      - plugin: MemeGenerator
        config:
          style: "搞笑"
      - plugin: Polisher
        config:
          style: "幽默"
      - plugin: SaveDraft
        config:
          platforms: ["微信", "微博", "抖音"]
  
  # 电商领域
  电商:
    steps:
      - plugin: DeepSeek
        config:
          prompt: "分析今天的电商优惠信息"
  
  # 科技领域
  科技:
    steps:
      - plugin: DeepSeek
        config:
          prompt: "汇总今天的科技新闻"
  
  # 新闻领域
  新闻:
    steps:
      - plugin: DeepSeek
        config:
          prompt: "汇总今天的重要新闻"
